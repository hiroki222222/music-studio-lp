<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENOVO MUSIC STUDIO & SCHOOL | 倉庫をリノベした音楽空間</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Oswald:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d4af37; 
            --bg-color: #1a1a1a;
            --surface-color: #2d2d2d;
            --text-color: #ffffff;
            --accent-gray: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            overflow-x: hidden;
        }

        h1, h2, .en-title { 
            font-family: 'Oswald', sans-serif; 
            text-transform: uppercase; 
            letter-spacing: 0.25em;
            font-weight: 600;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            z-index: 100;
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(10px);
        }
        .logo { font-size: 1.1rem; color: var(--primary-color); letter-spacing: 0.3em; }

        .hero {
            height: 100vh;
            /* 画像パスを正しく閉じました */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1514320298574-019d8162940e?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .hero h1 { font-size: clamp(2rem, 8vw, 3.5rem); margin-bottom: 20px; }
        .hero p { font-size: 0.9rem; margin-bottom: 40px; color: #eee; }

        .btn {
            display: inline-block;
            padding: 18px 50px;
            background-color: var(--primary-color);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            transition: 0.4s;
        }
        .btn:hover { background-color: #fff; transform: translateY(-3px); }

        section { padding: 120px 20px; max-width: 1100px; margin: 0 auto; }
        .section-title { text-align: center; margin-bottom: 60px; }
        .section-title h2 { font-size: 2.2rem; position: relative; padding-bottom: 15px; }
        .section-title h2::after {
            content: ""; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 40px; height: 2px; background: var(--primary-color);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--surface-color); padding: 40px; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card h3 { margin-bottom: 20px; color: var(--primary-color); }

        /* アニメーション用スタイル */
        .js-fade {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1.2s cubic-bezier(0.22, 1, 0.36, 1), transform 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .js-fade.is-active {
            opacity: 1;
            transform: translateY(0);
        }

        footer { text-align: center; padding: 60px 20px; color: var(--accent-gray); font-size: 0.7rem; }

        @media (max-width: 768px) {
            header { padding: 15px 20px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">RENOVO</div>
</header>

<div class="hero">
    <p class="en-title js-fade">Old Warehouse × New Music</p>
    <h1 class="js-fade">その響き、ヴィンテージ。</h1>
    <p class="js-fade">築古倉庫をリノベーションした、唯一無二の音楽練習空間。</p>
    <a href="#contact" class="btn js-fade">RESERVE / CONTACT</a>
</div>

<section id="concept">
    <div class="section-title js-fade">
        <h2>CONCEPT</h2>
        <p>唯一無二の響きを、その手に。</p>
    </div>
    <div style="text-align: center;" class="js-fade">
        <p>高い天井、剥き出しの鉄骨。歴史を刻んだ倉庫が、スタジオに生まれ変わりました。</p>
    </div>
</section>

<section id="services">
    <div class="section-title js-fade">
        <h2>SERVICES</h2>
    </div>
    <div class="grid">
        <div class="card js-fade">
            <h3>01. STUDIO</h3>
            <p>最新の防音設備と、倉庫の響きを活かした空間設計。</p>
        </div>
        <div class="card js-fade">
            <h3>02. SCHOOL</h3>
            <p>経験豊富な講師陣による個別レッスン。</p>
        </div>
    </div>
</section>

<footer id="contact">
    &copy; 2026 RENOVO MUSIC STUDIO. Developed by hiroki222222
</footer>

<script>
    const targets = document.querySelectorAll('.js-fade');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('is-active');
            }
        });
    }, { 
        rootMargin: '0px 0px -10% 0px', // 少し早めにアニメーション開始
        threshold: 0 
    });

    targets.forEach(target => {
        observer.observe(target);
    });
</script>

</body>
</html>
