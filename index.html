<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENOVO MUSIC STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Oswald:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d4af37; --bg-color: #1a1a1a; --text-color: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* アニメーションの「前」の状態（透明で下に隠れている） */
        .fade-in-up {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1), transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* アニメーションの「後」の状態（スクロールが到達したら付与される） */
        .fade-in-up.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* レイアウト */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1514320298574-019d8162940e?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        section { padding: 150px 20px; text-align: center; min-height: 80vh; }
        .card-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 50px; }
        .card { background: #2d2d2d; padding: 40px; width: 300px; border-radius: 5px; }
        .btn { display: inline-block; padding: 15px 40px; background: var(--primary-color); color: #000; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1 class="fade-in-up" style="font-family:'Oswald'; font-size: 3rem; letter-spacing: 0.2em;">RENOVO STUDIO</h1>
        <p class="fade-in-up" style="transition-delay: 0.3s;">その響き、ヴィンテージ。</p>
    </div>

    <section id="concept">
        <h2 class="fade-in-up">CONCEPT</h2>
        <p class="fade-in-up" style="margin-top: 20px;">築古倉庫をリノベーションした音楽空間。</p>
    </section>

    <section id="services">
        <h2 class="fade-in-up">SERVICES</h2>
        <div class="card-container">
            <div class="card fade-in-up" style="transition-delay: 0.2s;">
                <h3>STUDIO</h3>
                <p>24時間利用可能な練習室</p>
            </div>
            <div class="card fade-in-up" style="transition-delay: 0.4s;">
                <h3>SCHOOL</h3>
                <p>プロ講師による個別指導</p>
            </div>
        </div>
    </section>

    <section id="cta">
        <div class="fade-in-up">
            <h2>RESERVE</h2>
            <a href="#" class="btn">お問い合わせ</a>
        </div>
    </section>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                // 画面の中に要素が入ってきたら
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible'); // is-visibleクラスをつける
                }
            });
        }, {
            threshold: 0.1 // 10%見えたら発動
        });

        // fade-in-upという名前がついたすべての要素を監視する
        document.querySelectorAll('.fade-in-up').forEach(el => {
            observer.observe(el);
        });
    </script>

</body>
</html>
